<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Titanfall Server Statboard (Austin is a furry)</title>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-shell">
    <nav class="site-nav">
        <a href="/" class="active">Players</a>
        <a href="/servers/">Servers</a>
        <a href="/servers/history.html">History</a>
    </nav>

    <header class="page-header">
        <h1><span class="accent">Titanfall</span> Statboard</h1>
        <p class="subtitle">Player rankings across all servers</p>
    </header>

    <div class="controls-bar">
        <div class="control-group">
            <label for="dropdown-servers">Server</label>
            <select name="Server" id="dropdown-servers" onchange="updateDropdowns()"></select>
        </div>
        <div class="control-group">
            <label for="dropdown-stats">Statistic</label>
            <select name="Statistic" id="dropdown-stats" onchange="displayInfo()"></select>
        </div>
        <div class="control-group search-group">
            <label for="search-players">Search</label>
            <input type="search" id="search-players" placeholder="Player name..." autocomplete="off">
        </div>
    </div>

    <div class="data-table-wrap">
        <table class="data-table" id="stats-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th id="stat-header">Stat</th>
                </tr>
            </thead>
            <tbody id="stats-body"></tbody>
        </table>
        <div class="loading-indicator" id="loading">Loading data&hellip;</div>
        <div class="empty-state" id="empty" style="display:none;">No data available</div>
    </div>

    <div class="pagination" id="pages"></div>
</div>

<a href="https://benjaminperla.hair/" target="_blank" id="ad">
    <img src="benperlahair.jpg"
         onmouseover="this.src='benperlahairhover.jpg';"
         onmouseout="this.src='benperlahair.jpg';">
</a>

<script src="script.js"></script>
</body>
</html>
